<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>贪吃蛇网页版-期末作业</title>
    <style>
        *{margin:0;padding:0;background:#0f0f23;font-family:system-ui}
        body{display:flex;flex-direction:column;align-items:center;padding:20px;color:#fff}
        canvas{border:4px solid #888acc;border-radius:12px}
        .info{margin-bottom:10px;font-size:20px}
        .tip{margin-top:12px;color:#ccc;font-size:14px}
    </style>
</head>
<body>
    <div class="info">当前分数：<span id="score">0</span></div>
    <canvas id="game" width="800" height="600"></canvas>
    <div class="tip">方向键控制 | 撞墙/撞到自己游戏结束 | 回车重新开始</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreText = document.getElementById('score');

        const CELL = 20;
        let speed = 8;
        let score = 0;
        let gameOver = false;

        // 配色
        const BG = "#0f0f23";
        const SNAKE_BODY = "#00c8ff";
        const SNAKE_HEAD = "#ff6400";
        const FOOD = "#ff0064";
        const BORDER = "#888acc";

        // 蛇初始化
        let snake = [
            {x:400, y:300},
            {x:380, y:300},
            {x:360, y:300}
        ];
        let dir = {x:CELL, y:0};
        let food = genFood();

        // 生成食物
        function genFood(){
            let pos;
            while(!pos || snake.some(seg=>seg.x===pos.x&&seg.y===pos.y)){
                pos = {
                    x: Math.floor(Math.random()*(canvas.width/CELL))*CELL,
                    y: Math.floor(Math.random()*(canvas.height/CELL))*CELL
                }
            }
            return pos;
        }

        // 圆角矩形工具
        function roundRect(x,y,w,h,r){
            ctx.beginPath();
            ctx.moveTo(x+r,y);
            ctx.lineTo(x+w-r,y);
            ctx.quadraticCurveTo(x+w,y,x+w,y+r);
            ctx.lineTo(x+w,y+h-r);
            ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
            ctx.lineTo(x+r,y+h);
            ctx.quadraticCurveTo(x,y+h,x,y+h-r);
            ctx.lineTo(x,y+r);
            ctx.quadraticCurveTo(x,y,x+r,y);
            ctx.closePath();
            ctx.fill();
        }

        // 绘制画面
        function draw(){
            ctx.fillStyle = BG;
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 外边框
            ctx.fillStyle = BORDER;
            roundRect(10,10,780,580,15);
            ctx.fillStyle = BG;
            roundRect(20,20,760,560,10);

            // 食物
            ctx.fillStyle = FOOD;
            ctx.beginPath();
            ctx.arc(food.x+CELL/2, food.y+CELL/2, CELL/2-2, 0, Math.PI*2);
            ctx.fill();

            // 蛇
            snake.forEach((seg,i)=>{
                ctx.fillStyle = i===0 ? SNAKE_HEAD : SNAKE_BODY;
                roundRect(seg.x, seg.y, CELL, CELL,5);
            })

            // 游戏结束遮罩
            if(gameOver){
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle="#ff3232";
                ctx.font="60px sans-serif";
                ctx.textAlign="center";
                ctx.fillText("游戏结束！",400,240);
                ctx.fillStyle="#fff";
                ctx.font="40px sans-serif";
                ctx.fillText("最终得分："+score,400,300);
                ctx.fillStyle="#ccc";
                ctx.font="25px sans-serif";
                ctx.fillText("按回车键重新开始",400,360);
            }
        }

        // 更新逻辑
        function update(){
            if(gameOver) return;
            const head = snake[0];
            const newHead = {x:head.x+dir.x, y:head.y+dir.y};

            // 撞墙判定
            if(newHead.x<0 || newHead.x>=canvas.width || newHead.y<0 || newHead.y>=canvas.height){
                gameOver = true;
                return;
            }
            // 撞自身
            if(snake.some(seg=>seg.x===newHead.x&&seg.y===newHead.y)){
                gameOver = true;
                return;
            }

            snake.unshift(newHead);
            if(newHead.x === food.x && newHead.y === food.y){
                score +=10;
                speed +=0.3;
                scoreText.innerText = score;
                food = genFood();
            }else{
                snake.pop();
            }
        }

        // 键盘监听
        window.addEventListener("keydown",e=>{
            if(gameOver){
                if(e.key === "Enter"){
                    // 重置游戏
                    snake = [
                        {x:400, y:300},
                        {x:380, y:300},
                        {x:360, y:300}
                    ];
                    dir = {x:CELL, y:0};
                    food = genFood();
                    score = 0;
                    speed = 8;
                    gameOver = false;
                    scoreText.innerText = 0;
                }
                return;
            }
            switch(e.key){
                case "ArrowUp":
                    if(dir.y !== CELL) dir = {x:0,y:-CELL};
                    break;
                case "ArrowDown":
                    if(dir.y !== -CELL) dir = {x:0,y:CELL};
                    break;
                case "ArrowLeft":
                    if(dir.x !== CELL) dir = {x:-CELL,y:0};
                    break;
                case "ArrowRight":
                    if(dir.x !== -CELL) dir = {x:CELL,y:0};
                    break;
            }
        })

        // 游戏循环
        function loop(){
            update();
            draw();
            setTimeout(loop, 1000/speed);
        }
        loop();
    </script>
</body>
</html>
